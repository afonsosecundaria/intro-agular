<app-titulo-principal></app-titulo-principal>

<h2>Disciplinas</h2>

<table>
  <tr>
    <th>Nome</th>
    <th>Docente</th>
    <th>Carga Horária</th>
  </tr>

  @for(disc of disciplinas; track disc.nome){
    <!-- <tr *ngFor="let disc of disciplinas"> -->
    <tr>
      <td>{{disc.nome}}</td>
      <td>{{disc.docente}}</td>
      <td>{{disc.ch}}</td>
    </tr>
  }
</table>
