<div class="container">

    <h1>Dashboard</h1>
  
    <h2>Disciplinas</h2>
  
    <table>
      <tr>
        <th>Nome</th>
        <th>Docente</th>
        <th>Carga Horária</th>
      </tr>
  
      @for (disc of disciplinas; track disc.nome) {
        <tr>
          <td>{{ disc.nome }}</td>
          <td>{{ disc.docente }}</td>
          <td>{{ disc.ch }}</td>
        </tr>
      }
    </table>
  
</div>
<app-exibe-mensagem></app-exibe-mensagem>
